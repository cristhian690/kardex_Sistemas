services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kardex_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kardex_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: "12345"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kardex_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: kardex_backend
    restart: unless-stopped
    environment:
      APP_NAME:                    "Kardex System"
      APP_VERSION:                 "1.0.0"
      DEBUG:                       "false"
      DATABASE_URL:                "postgresql+asyncpg://postgres:12345@db:5432/kardex_db"
      SECRET_KEY:                  "cambia_esta_clave_por_una_segura_en_produccion"
      ALGORITHM:                   "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      ALLOWED_ORIGINS:             '["http://localhost", "http://localhost:80"]'
      MAX_FILE_SIZE_MB:            "50"
      UPLOAD_DIR:                  "uploads"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: kardex_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local